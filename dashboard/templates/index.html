<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Cyber Defense Dashboard - MN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #f5f7fa;
        margin: 0;
        padding: 0;
      }
      header {
        background: linear-gradient(90deg, #1d3557, #457b9d);
        color: white;
        padding: 20px;
        text-align: center;
      }
      header h1 {
        margin: 0;
        font-size: 2rem;
      }
      header h2 {
        margin: 5px 0 0;
        font-weight: 400;
        font-size: 1rem;
        opacity: 0.9;
      }
      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        padding: 20px;
      }
      .card h3 {
        margin-top: 0;
        color: #1d3557;
      }
      .metric {
        font-size: 1.2rem;
        margin: 10px 0;
      }
      footer {
        background: #1d3557;
        color: white;
        text-align: center;
        padding: 10px;
        margin-top: 20px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Cyber Defense Dashboard</h1>
      <h2>Developed by MN</h2>
    </header>

    <main>
      <!-- System Metrics -->
      <div class="card">
        <h3>System Metrics</h3>
        <p class="metric"><strong>CPU Usage:</strong> <span id="cpu">--</span>%</p>
        <p class="metric"><strong>Memory Usage:</strong> <span id="mem">--</span>%</p>
      </div>

      <!-- Host Info -->
      <div class="card">
        <h3>Host Information</h3>
        <p><strong>Hostname:</strong> <span id="hostname">--</span></p>
        <p><strong>IP Address:</strong> <span id="ip">--</span></p>
        <p><strong>MAC Address:</strong> <span id="mac">--</span></p>
        <p><strong>Operating System:</strong> <span id="os">--</span></p>
        <p><strong>CPU Cores:</strong> <span id="cores">--</span></p>
        <p><strong>Total Memory:</strong> <span id="memtotal">--</span> MB</p>
      </div>
    </main>

    <footer>
      &copy; 2025 MN | Self-Healing Cyber Defense Platform
    </footer>

    <script>
      async function refreshData() {
        try {
          const res = await fetch("/api/metrics");
          const data = await res.json();

          // System metrics update
          document.getElementById("cpu").innerText = data.metrics.cpu_percent.toFixed(1);
          document.getElementById("mem").innerText = data.metrics.memory_percent.toFixed(1);

          // Host info update
          document.getElementById("hostname").innerText = data.host.hostname;
          document.getElementById("ip").innerText = data.host.local_ip;
          document.getElementById("mac").innerText = data.host.mac;
          document.getElementById("os").innerText = data.host.os;
          document.getElementById("cores").innerText = data.host.cpu_count;
          document.getElementById("memtotal").innerText = data.host.memory_total_mb;
        } catch (e) {
          console.error("Failed to fetch metrics:", e);
        }
      }

     
      refreshData();
      // refresh
      setInterval(refreshData, 5000);
    </script>
  </body>
</html>
